name: GitHub Profile Summary Cards

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Generate Cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        with:
          USERNAME: 1stByte
          UTC_OFFSET: -4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
